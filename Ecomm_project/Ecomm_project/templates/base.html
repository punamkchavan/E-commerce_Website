{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title%}Ecomm_Web{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  </head>
  {% block content %}
  <body>
     <div class='container'>
      
       <!-- start of header section-->
    <div class="container">
      <div class="row">
          <nav class="navbar navbar-expand-lg bg-body-tertiary">
              <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'index' %}">Shopee</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" 
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                  <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                  <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                      <a class="nav-link active" aria-current="page" href="{% url 'index' %}">Home</a>
                    </li>
                    <li class="nav-item dropdown">
                      <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Category
                      </a>
                      <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Mobile</a></li>
                        <li><a class="dropdown-item" href="#">Cloths</a></li>
                        <li><a class="dropdown-item" href="#">Shoes</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#">Electronics</a></li>
                      </ul>
                    </li>
                    
                    <!--{% if user.is_authenticated %}-->
                    <li class="nav-item">
                      <a class="nav-link" href="#">Logout</a>
                      <a class="nav-link" href="#">My Orders</a>
                    </li>
                   <!--- {% else %} -->
                    <li class="nav-item">
                      <a class="nav-link" href="#">SignIn</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="#">SignUp</a>
                    </li>
                   <!--- {% endif %}-->
                    <li class="nav-item">
                      <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="#">Contact</a>
                    </li>
                  </ul>
                 <!--- {% if user.is_authenticated %}-->
                  <strong>Welcome <!---{{user}}--></strong> &nbsp;&nbsp;
                 <!--- {% else %}-->
                  <strong>Welcome Guest</strong> &nbsp;&nbsp;
                  <!---{% endif %}-->

                  &nbsp;<a href="#"><i class="bi bi-cart-check-fill"></i></a>
                 <!-- <form class="d-flex" role="search" method="get" action=" ">{% url 'searchproduct' %}-->
                    <input class="form-control me-2" name="q"   type="search" placeholder="Search" aria-label="Search"><!--value="{{query}}"-->
                    <button class="btn btn-outline-success" type="submit">Search</button>
                  </form>
                </div>
              </div>
            </nav>
      </div>
  </div>
  <!-- end of header section-->
      {% endblock %}
     </div>
  </body>
</html>
